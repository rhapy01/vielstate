kind = "web"
previewPath = "/"
title = "ShieldCap"
version = "1.0.0"
id = "artifacts/shieldcap"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21373

[services.development]
run = "pnpm --filter @workspace/shieldcap run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shieldcap", "run", "build" ]
publicDir = "artifacts/shieldcap/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21373"
BASE_PATH = "/"
